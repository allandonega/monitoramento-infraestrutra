# ============================================================
# Monitoramento de Infraestrutura — application.properties
# ============================================================

spring.application.name=monitoramento-infraestrutura
server.port=8080

# ── H2 Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/monitoramento;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA/Hibernate ────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Thresholds de Alerta ─────────────────────────────────────
alerta.disco.percentual=80
alerta.memoria.percentual=85
alerta.processo.memoria.mb=500

# ── Retenção de Histórico (dias) ──────────────────────────────
historico.retencao.dias=30

# ── Intervalos de Coleta (ms) ────────────────────────────────
coleta.disco.intervalo=300000
coleta.memoria.intervalo=30000
coleta.rede.intervalo=10000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.monitora=INFO
logging.level.org.springframework=WARN
