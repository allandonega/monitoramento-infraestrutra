# ============================================================
# Monitoramento de Infraestrutura — application.properties
# ============================================================

spring.application.name=monitoramento-infraestrutura
server.port=8080

# ── H2 Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/monitoramento;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA/Hibernate ────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Thresholds de Alerta ─────────────────────────────────────
alerta.cpu.percentual=90
alerta.disco.percentual=80
alerta.memoria.percentual=85
alerta.processo.memoria.mb=500

# Alertas externos
alerta.email.enabled=false
alerta.email.to=ops-team@empresa.com
alerta.webhook.enabled=false
alerta.webhook.url=https://hooks.exemplo.com/alerta

# Configuração JavaMail (opcional)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your-user
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cooldown de alertas em segundos (minutos):
alerta.cooldown.segundos=300

# ── Retenção de Histórico (dias) ──────────────────────────────
historico.retencao.dias=30

# ── Intervalos de Coleta (ms) ────────────────────────────────
coleta.disco.intervalo=300000
coleta.memoria.intervalo=30000
coleta.rede.intervalo=10000

# ── Scheduling / Async ───────────────────────────────────────
spring.task.scheduling.pool.size=10
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=task-

# ── Logging ──────────────────────────────────────────────────
logging.level.com.monitora=INFO
logging.level.org.springframework=WARN
